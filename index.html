<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="筋トレガチ勢のためのワークアウト記録アプリ。重量・レップ数の管理、PR追跡、統計グラフをオフラインで。">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Iron Log - 筋トレ記録</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="assets/icons/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- ウェルカム画面（初回のみ） -->
  <div id="welcome-screen" class="screen welcome-screen hidden">
    <div class="welcome-container">
      <div class="welcome-step active" data-step="1">
        <div class="welcome-icon">🏋️</div>
        <h1>Iron Log へようこそ</h1>
        <p>筋トレガチ勢のためのワークアウト記録アプリ。<br>重量・ボリュームを徹底管理しよう。</p>
        <button class="btn btn-primary welcome-next" data-next="2">次へ</button>
      </div>
      <div class="welcome-step" data-step="2">
        <div class="welcome-icon">📊</div>
        <h1>進捗を可視化</h1>
        <p>推定1RM、最大重量、総ボリュームの推移をグラフで確認。<br>PRを更新したら派手にお祝い🎉</p>
        <button class="btn btn-primary welcome-next" data-next="3">次へ</button>
      </div>
      <div class="welcome-step" data-step="3">
        <div class="welcome-icon">💪</div>
        <h1>ニックネームを設定</h1>
        <p>お好みのニックネームを入力してください（後から変更可能）</p>
        <input type="text" id="welcome-nickname" class="input-field" placeholder="例: たかし" maxlength="20">
        <button class="btn btn-primary" id="welcome-start">はじめる</button>
      </div>
    </div>
    <div class="welcome-dots">
      <span class="dot active" data-step="1"></span>
      <span class="dot" data-step="2"></span>
      <span class="dot" data-step="3"></span>
    </div>
  </div>

  <!-- メインアプリ -->
  <div id="app" class="app-container hidden">
    <!-- PC用サイドバー -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <button id="sidebar-toggle" class="sidebar-toggle" aria-label="メニュー切替">
          <span class="hamburger"></span>
        </button>
        <span class="sidebar-logo">Iron Log</span>
      </div>
      <ul class="sidebar-nav">
        <li><a href="#dashboard" class="nav-item active" data-page="dashboard"><span class="nav-icon">🏠</span><span
              class="nav-label">ホーム</span></a></li>
        <li><a href="#workout" class="nav-item" data-page="workout"><span class="nav-icon">💪</span><span
              class="nav-label">記録</span></a></li>
        <li><a href="#history" class="nav-item" data-page="history"><span class="nav-icon">📅</span><span
              class="nav-label">履歴</span></a></li>
        <li><a href="#stats" class="nav-item" data-page="stats"><span class="nav-icon">📊</span><span
              class="nav-label">統計</span></a></li>
        <li><a href="#settings" class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span><span
              class="nav-label">設定</span></a></li>
      </ul>
    </nav>

    <!-- メインコンテンツ -->
    <main id="main-content" class="main-content">
      <!-- ダッシュボード画面 -->
      <section id="page-dashboard" class="page active">
        <div id="dashboard-content"></div>
      </section>

      <!-- ワークアウト記録画面 -->
      <section id="page-workout" class="page">
        <div id="workout-content"></div>
      </section>

      <!-- 履歴画面 -->
      <section id="page-history" class="page">
        <div id="history-content"></div>
      </section>

      <!-- 統計画面 -->
      <section id="page-stats" class="page">
        <div id="stats-content"></div>
      </section>

      <!-- 設定画面 -->
      <section id="page-settings" class="page">
        <div id="settings-content"></div>
      </section>
    </main>

    <!-- モバイル用タブバー -->
    <nav id="tab-bar" class="tab-bar">
      <a href="#dashboard" class="tab-item active" data-page="dashboard"><span class="tab-icon">🏠</span><span
          class="tab-label">ホーム</span></a>
      <a href="#workout" class="tab-item" data-page="workout"><span class="tab-icon">💪</span><span
          class="tab-label">記録</span></a>
      <a href="#history" class="tab-item" data-page="history"><span class="tab-icon">📅</span><span
          class="tab-label">履歴</span></a>
      <a href="#stats" class="tab-item" data-page="stats"><span class="tab-icon">📊</span><span
          class="tab-label">統計</span></a>
      <a href="#settings" class="tab-item" data-page="settings"><span class="tab-icon">⚙️</span><span
          class="tab-label">設定</span></a>
    </nav>
  </div>

  <!-- ボトムシート（種目選択など） -->
  <div id="bottom-sheet-overlay" class="bottom-sheet-overlay hidden">
    <div id="bottom-sheet" class="bottom-sheet">
      <div class="bottom-sheet-handle"></div>
      <div id="bottom-sheet-content" class="bottom-sheet-content"></div>
    </div>
  </div>

  <!-- モーダル -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div id="modal-content" class="modal-content"></div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast-container" class="toast-container"></div>

  <!-- 休憩タイマーバー -->
  <div id="rest-timer-bar" class="rest-timer-bar hidden">
    <div class="rest-timer-inner">
      <div class="rest-timer-progress">
        <svg class="rest-timer-svg" viewBox="0 0 60 60">
          <circle class="rest-timer-bg" cx="30" cy="30" r="26"></circle>
          <circle id="rest-timer-circle" class="rest-timer-fg" cx="30" cy="30" r="26"></circle>
        </svg>
        <span id="rest-timer-seconds" class="rest-timer-seconds">90</span>
      </div>
      <div class="rest-timer-label">休憩中</div>
      <div class="rest-timer-actions">
        <button id="rest-timer-add30" class="btn btn-sm btn-ghost">+30秒</button>
        <button id="rest-timer-skip" class="btn btn-sm btn-primary">スキップ</button>
      </div>
    </div>
  </div>

  <!-- パーティクルキャンバス（PR演出用） -->
  <canvas id="particle-canvas" class="particle-canvas"></canvas>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="js/firebase-client.js"></script>
  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/workout.js"></script>
  <script src="js/history.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
